# ============================================
# Face ID — Docker Compose (Full Stack)
# ============================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose up -d --build  # Rebuild and start
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop all services
# ============================================

services:
  # ==========================================
  # Infrastructure
  # ==========================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: face_id_postgres
    environment:
      POSTGRES_DB: face_id
      POSTGRES_USER: face_id_user
      POSTGRES_PASSWORD: change_me_in_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face_id_user -d face_id"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: face_id_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Backend Microservices
  # ==========================================

  camera-service:
    build:
      context: ./services/camera
      dockerfile: Dockerfile
    container_name: face_id_camera
    ports:
      - "8001:8001"
    environment:
      - CAMERA_FRAME_WIDTH=640
      - CAMERA_FRAME_HEIGHT=480
      - CAMERA_FPS=30
      - CAMERA_DEPTH_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    # Required for USB camera access
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true
    restart: unless-stopped

  face-service:
    build:
      context: .
      dockerfile: services/face_processing/Dockerfile
    container_name: face_id_face
    ports:
      - "8002:8002"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=face_id
      - POSTGRES_USER=face_id_user
      - POSTGRES_PASSWORD=change_me_in_production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FACE_DETECTION_CONFIDENCE=0.7
      - FACE_RECOGNITION_THRESHOLD=0.6
      - ANTI_SPOOF_THRESHOLD=0.5
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    #volumes:
      #- face_models:/app/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G  # InsightFace models need RAM

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: face_id_auth
    ports:
      - "8003:8003"
    environment:
      - JWT_SECRET_KEY=change_me_to_a_random_secret_key_at_least_32_chars
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - FACE_SERVICE_HOST=face-service
      - FACE_SERVICE_PORT=8002
      - CAMERA_SERVICE_HOST=camera-service
      - CAMERA_SERVICE_PORT=8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    depends_on:
      - face-service
      - camera-service
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    container_name: face_id_gateway
    ports:
      - "8000:8000"
    environment:
      - CAMERA_SERVICE_HOST=camera-service
      - CAMERA_SERVICE_PORT=8001
      - FACE_SERVICE_HOST=face-service
      - FACE_SERVICE_PORT=8002
      - AUTH_SERVICE_HOST=auth-service
      - AUTH_SERVICE_PORT=8003
      - JWT_SECRET_KEY=change_me_to_a_random_secret_key_at_least_32_chars
      - JWT_ALGORITHM=HS256
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    depends_on:
      - auth-service
      - camera-service
      - face-service
    restart: unless-stopped

  # ==========================================
  # Frontend
  # ==========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: face_id_frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  face_models:
    driver: local
